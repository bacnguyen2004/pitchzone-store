services:
  - type: web
    name: pitchzone-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_DEBUG
        value: False
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: pitchzone-api.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://pitchzone-api.onrender.com,https://pitchzone-web.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://pitchzone-web.onrender.com
      - key: FRONTEND_URL
        value: https://pitchzone-web.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: pitchzone-db
          property: connectionString
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_USE_TLS
        value: True
      - key: EMAIL_USE_SSL
        value: False
      - key: EMAIL_FAIL_SILENTLY
        value: False
      - key: VNPAY_TMN_CODE
        sync: false
      - key: VNPAY_HASH_SECRET
        sync: false
      - key: VNPAY_PAYMENT_URL
        value: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      - key: VNPAY_RETURN_URL
        value: https://pitchzone-api.onrender.com/vnpay/return/
      - key: VNPAY_IPN_URL
        value: https://pitchzone-api.onrender.com/vnpay/ipn/
      - key: VNPAY_EXPIRE_MINUTES
        value: 15

  - type: web
    name: pitchzone-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://pitchzone-api.onrender.com/api
      - key: VITE_ADDRESS_API_BASE
        value: https://provinces.open-api.vn/api/v2
      - key: VITE_APP_NAME
        value: PitchZone
      - key: VITE_FREE_SHIPPING_THRESHOLD
        value: 2000000
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: pitchzone-db
    plan: free
    databaseName: pitchzone_db
    user: pitchzone_user
