services:
  db:
    image: postgres:16
    container_name: pitchzone_db
    environment:
      POSTGRES_DB: pitchzone_db
      POSTGRES_USER: pitchzone_user
      POSTGRES_PASSWORD: pitchzone_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  backend:
    build:
      context: ./backend
    container_name: pitchzone_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8888:8000"
    env_file:
      - ./backend/.env.docker
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: pitchzone_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env.docker
    depends_on:
      - backend

volumes:
  postgres_data: